# config.yaml
ner:
  backend: "hanlp"
  hanlp_model: "CLOSE_TOK_POS_NER_SRL_DEP_SDP_CON_ELECTRA_SMALL_ZH"
  linkable_types: ["ORG", "PERSON", "GPE", "LOC"]

knowledge_base:
  type: "json"
  path: "./data/energy_entities.json"

# BGE 模型在项目内
bge_model_path: "./models_cache/bge-large-zh-v1.5"

disambiguator:
  nil_threshold: 0.80
  bge_llm_trigger_threshold: 0.65


reranker_enabled: true
reranker_model_path: "./models_cache/bge-reranker-large"
reranker_top_k: 6
reranker_weight: 0.7
bge_reranker_weight: 0.3

llm_fallback:
  enabled: false
  provider: "openai"
  api_key: "sk-ws-H.RERDMME.mtnS.MEYCIQC52O9l9Bdvlaq-cxsuVO6isL-njt7bRLHTvo9r0jR5RQIhAMenFxknVyXygcQM3u9V_lkT4JuI6W1aDH_DqfQ3ogsH"  # 您的API Key
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"  # 使用标准网关
  model: "qwen-max"  # 或 qwen-max, qwen-plus
  timeout: 30
  max_retries: 2
  cache_enabled: true
  cache_ttl: 86400

# 共指消解 (FastCoref + XLM-RoBERTa)
coreference:
  enabled: false  # 默认关闭
  mode: "fastcoref"  # 或 "heuristic"
  model: "xlm-roberta-base"  # 或 "xlm-roberta-large"
  device: "cpu"  # 或 "cuda"

tracer_db: "./data/link_records.db"